name: Output Metadata
on: [push, workflow_dispatch]

jobs:
  output-context:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Output GitHub Context
      run: |
        echo "========== GITHUB CONTEXT (JSON) =========="
        echo '${{ toJson(github) }}'
        echo ""
        
    - name: Output Runner Context
      run: |
        echo "========== RUNNER CONTEXT (JSON) =========="
        echo '${{ toJson(runner) }}'
        echo ""
        
    - name: Output Event Payload
      run: |
        echo "========== EVENT PAYLOAD (JSON) =========="
        echo '${{ toJson(github.event) }}'
        echo ""
        
    - name: Output Job Context
      run: |
        echo "========== JOB CONTEXT (JSON) =========="
        echo '${{ toJson(job) }}'
        echo ""
        
    - name: Output Steps Context
      run: |
        echo "========== STEPS CONTEXT (JSON) =========="
        echo '${{ toJson(steps) }}'
        echo ""
        
    - name: Available Environment Variables
      run: |
        echo "========== ENVIRONMENT VARIABLES =========="
        printenv | sort

