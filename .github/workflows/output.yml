name: Output Metadata
on: [push, workflow_dispatch]

jobs:
  output-context:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Output GitHub Context
      run: |
        echo "========== GITHUB CONTEXT =========="
        echo "Repository: ${{ github.repository }}"
        echo "Repository Owner: ${{ github.repository_owner }}"
        echo "Repository Name: ${{ github.event.repository.name }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit SHA: ${{ github.sha }}"
        echo "Commit Message: ${{ github.event.head_commit.message }}"
        echo "Actor (User): ${{ github.actor }}"
        echo "Event Name: ${{ github.event_name }}"
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Job ID: ${{ github.job }}"
        echo "Server URL: ${{ github.server_url }}"
        echo ""
        
    - name: Output Runner Context
      run: |
        echo "========== RUNNER CONTEXT =========="
        echo "OS: ${{ runner.os }}"
        echo "Architecture: ${{ runner.arch }}"
        echo "Temp Directory: ${{ runner.temp }}"
        echo "Tool Cache: ${{ runner.tool_cache }}"
        echo ""
        
    - name: Output Event Payload
      run: |
        echo "========== EVENT PAYLOAD =========="
        echo "Event Action: ${{ github.event.action }}"
        echo "Ref: ${{ github.ref }}"
        echo "Base Ref: ${{ github.base_ref }}"
        echo "Head Ref: ${{ github.head_ref }}"
        echo ""
        
    - name: Full GitHub Context (JSON)
      run: |
        echo "========== FULL GITHUB CONTEXT (JSON) =========="
        echo '${{ toJson(github) }}'
        echo ""
        
    - name: Full Runner Context (JSON)
      run: |
        echo "========== FULL RUNNER CONTEXT (JSON) =========="
        echo '${{ toJson(runner) }}'
        echo ""
        
    - name: Available Environment Variables
      run: |
        echo "========== ENVIRONMENT VARIABLES =========="
        printenv | sort

